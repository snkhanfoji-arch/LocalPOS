workflows:
  build-apk:
    name: Build PosKhata Pro APK
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Clean
        script: flutter clean
      - name: Get packages  
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - snkhanfoji@gmail.com
        notify:
          success: true
          failure: true
