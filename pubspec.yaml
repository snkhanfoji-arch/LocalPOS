name: poskhata_pro
description: A complete Flutter POS + Khata app for chicken and electrical shops.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  sqflite: ^2.3.0
  intl: ^0.18.1
  pdf: ^3.10.4
  printing: ^5.11.0
  shared_preferences: ^2.2.0
  flutter_barcode_scanner: ^2.0.0
  path_provider: ^2.1.1
  file_picker: ^6.1.1
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
